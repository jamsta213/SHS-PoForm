<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&display=swap" rel="stylesheet">
  <style>
    body, html {
      font-family: 'DM Sans', sans-serif;
      background: #FAF8F4;
      color: #1C1C1A;
      margin: 0; padding: 0; width: 100%;
      display: flex; justify-content: center;
    }
    .container {
      padding: 30px 15px;
      text-align: center;
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
    }
    .logo-header { width: 100%; max-width: 280px; margin: 0 auto 20px auto; display: block; height: auto; }
    h1 { font-size: 28px; font-weight: 700; color: #2D5F3F; margin-bottom: 30px; }
    .form-step { display: none; }
    .active { display: block !important; }
    .field { margin-bottom: 30px; text-align: left; width: 100%; }
    label { display: block; font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #444; }
    .desc { font-size: 14px; font-style: italic; color: #666; margin-bottom: 8px; display: block; line-height: 1.2; }

    input, select {
      width: 100%; height: 60px; padding: 0 15px; border: 2px solid #D8D4CC;
      border-radius: 12px; font-size: 16px; font-weight: 700; box-sizing: border-box;
      background-color: white;
    }

    .currency-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .currency-symbol {
      position: absolute;
      left: 15px;
      font-size: 18px;
      font-weight: 700;
      color: #1C1C1A;
    }
    .currency-wrapper input {
      padding-left: 35px;
    }

    .btn-next, .btn-submit {
      width: 100%; height: 70px; background: #2D5F3F; color: #FFFFFF;
      border: none; border-radius: 12px; font-size: 24px; font-weight: 700; cursor: pointer; margin-top: 10px;
    }
    .btn-back {
      width: 100%; height: 70px; background: #E8E6E1; color: #1C1C1A;
      border: none; border-radius: 12px; font-size: 24px; font-weight: 700; cursor: pointer; margin-top: 10px;
    }
    .summary-box { background: #fff; padding: 20px; border-radius: 15px; border: 2px solid #D8D4CC; text-align: left; margin-bottom: 20px;}
    .other-input { display: none; margin-top: 10px; }
    #success-icon { font-size: 60px; color: #2D5F3F; margin-bottom: 20px; }

    /* Loading spinner overlay */
    #loadingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(250,248,244,0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #loadingOverlay.visible { display: flex; }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #D8D4CC;
      border-top-color: #2D5F3F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingOverlay p { font-size: 18px; font-weight: 700; color: #2D5F3F; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p id="loadingMsg">Loading…</p>
</div>

<div class="container">
  <img src="https://drive.google.com/thumbnail?id=12KWoJLRUDRozds2VcJM_WXwbz80fGeV3&sz=w1000" class="logo-header">

  <form id="poForm" onsubmit="return false;">

    <div id="step-details" class="form-step active">
      <h1>Purchase Order Form</h1>
      <div class="field">
        <label>Name</label>
        <input type="text" id="userName" required>
      </div>
      <div class="field">
        <label>Budget</label>
        <select id="budgetSelect" required><option value="">Select Budget</option></select>
      </div>
      <div class="field">
        <label>Supplier</label>
        <select id="supplierSelect" onchange="toggleOtherSupplier(this)" required>
          <option value="">Select Supplier</option>
        </select>
        <input type="text" id="otherSupplierText" class="other-input" placeholder="Enter supplier name">
      </div>
      <button type="button" class="btn-next" onclick="validatePage1()">Next Step</button>
    </div>

    <div id="item-steps-container"></div>

    <div id="step-confirm" class="form-step">
      <h1>Confirmation</h1>
      <div id="previewArea" class="summary-box"></div>
      <div class="field">
        <label>Order Description</label>
        <span class="desc">Please give your order a name - this will make it easier for you to manage your orders. Eg - "History week books"</span>
        <input type="text" id="orderDesc" required>
      </div>
      <div class="field">
        <label>Any other comments</label>
        <input type="text" id="comments">
      </div>
      <button type="button" class="btn-submit" id="submitBtn" onclick="submitForm()">Submit Request</button>
      <button type="button" class="btn-back" onclick="prevStep()">Back</button>
    </div>

    <div id="step-success" class="form-step">
      <div id="success-icon"> ✓ </div>
      <h1>Request Submitted</h1>
      <p style="font-weight: 700; color: #444; margin-bottom: 30px;">Your purchase order has been successfully recorded.</p>
      <button type="button" class="btn-next" onclick="location.reload()">Submit Another</button>
    </div>
  </form>
</div>

<script>
  let currentItemIndex = 1;
  const maxItems = 10;

  function showLoading(msg) {
    document.getElementById('loadingMsg').textContent = msg || 'Loading…';
    document.getElementById('loadingOverlay').classList.add('visible');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('visible');
  }

  window.onload = async () => {
    generateItemPages();
    showLoading('Loading form data…');
    try {
      const res = await fetch('/.netlify/functions/getFormData');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
      const bSel = document.getElementById('budgetSelect');
      const sSel = document.getElementById('supplierSelect');
      data.budgets.forEach(b => bSel.add(new Option(b, b)));
      data.suppliers.forEach(s => sSel.add(new Option(s, s)));
      sSel.add(new Option("Other", "other"));
    } catch (err) {
      alert('Failed to load form data. Please refresh and try again.\n' + err.message);
    } finally {
      hideLoading();
    }
  };

  function validatePage1() {
    const name = document.getElementById('userName');
    const budget = document.getElementById('budgetSelect');
    const supplier = document.getElementById('supplierSelect');
    const other = document.getElementById('otherSupplierText');
    if (!name.reportValidity() || !budget.reportValidity() || !supplier.reportValidity()) return;
    if (supplier.value === 'other' && !other.value.trim()) {
      other.reportValidity();
      return;
    }
    nextStep('step-item-1');
  }

  function generateItemPages() {
    const container = document.getElementById('item-steps-container');
    for (let i = 1; i <= maxItems; i++) {
      const div = document.createElement('div');
      div.id = `step-item-${i}`;
      div.className = 'form-step';
      div.innerHTML = `
        <h1>Item ${i}</h1>
        <div class="field">
          <label>Item Name</label>
          <span class="desc">Or description of item</span>
          <input type="text" id="itemName-${i}" required>
        </div>
        <div class="field">
          <label>Product Code</label>
          <span class="desc">For catalogue orders (eg TTS/KCS/GLS)</span>
          <input type="text" id="itemCode-${i}">
        </div>
        <div class="field">
          <label>Item Link</label>
          <span class="desc">For all orders you MUST enter the link. If no link just enter na.com</span>
          <input type="text" id="itemLink-${i}" placeholder="e.g. na.com or www.google.com" required>
        </div>
        <div class="field">
          <label>Price</label>
          <span class="desc">For eg if the item is £1.50 type in 1.50, for 59p type 0.59.</span>
          <div class="currency-wrapper">
            <span class="currency-symbol">£</span>
            <input type="number" id="itemPrice-${i}" step="0.01" min="0.01" onblur="formatPrice(this)" required>
          </div>
        </div>
        <div class="field">
          <label>Quantity</label>
          <input type="number" id="itemQty-${i}" step="1" min="1" value="1" required>
        </div>
        <div class="field">
          <label>Do you have more items to add?</label>
          <select id="hasMore-${i}">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
        <button type="button" class="btn-next" onclick="handleItemNext(${i})">Next Step</button>
        <button type="button" class="btn-back" onclick="prevStep()">Back</button>
      `;
      container.appendChild(div);
    }
  }

  function formatPrice(input) {
    if (input.value !== "") {
      let val = parseFloat(input.value);
      if (!isNaN(val)) input.value = val.toFixed(2);
    }
  }

  function toggleOtherSupplier(el) {
    const other = document.getElementById('otherSupplierText');
    other.style.display = el.value === 'other' ? 'block' : 'none';
    other.required = el.value === 'other';
  }

  function handleItemNext(num) {
    const linkInput = document.getElementById(`itemLink-${num}`);
    linkInput.setCustomValidity("");

    const inputs = document.querySelectorAll(`#step-item-${num} [required]`);
    let valid = true;
    inputs.forEach(input => { if (!input.reportValidity()) valid = false; });
    if (!valid) return;

    const linkVal = linkInput.value.trim();
    const linkPattern = /\.[a-z]{2,}/i;
    if (!linkPattern.test(linkVal) || linkVal.length < 4) {
      linkInput.setCustomValidity("Please enter a valid web link (e.g. na.com or www.google.com)");
      linkInput.reportValidity();
      return;
    }

    const more = document.getElementById(`hasMore-${num}`).value;
    if (more === 'yes' && num < maxItems) {
      currentItemIndex = num + 1;
      nextStep(`step-item-${num + 1}`);
    } else {
      currentItemIndex = num;
      showSummary();
      nextStep('step-confirm');
    }
  }

  function showSummary() {
    const name = document.getElementById('userName').value;
    const budget = document.getElementById('budgetSelect').value;
    const sEl = document.getElementById('supplierSelect');
    const supplier = sEl.value === 'other' ? document.getElementById('otherSupplierText').value : sEl.value;

    let grandTotal = 0;
    let html = `<b>Name:</b> ${name}<br><b>Budget:</b> ${budget}<br><b>Supplier:</b> ${supplier}<hr>`;

    for (let i = 1; i <= currentItemIndex; i++) {
      const itemName = document.getElementById(`itemName-${i}`).value;
      const qty = parseInt(document.getElementById(`itemQty-${i}`).value) || 0;
      const price = parseFloat(document.getElementById(`itemPrice-${i}`).value) || 0;
      const itemTotal = qty * price;
      grandTotal += itemTotal;

      html += `<b>Item ${i}:</b> ${itemName}<br>`;
      html += `Qty: ${qty} x £${price.toFixed(2)} = <b>£${itemTotal.toFixed(2)}</b><br><br>`;
    }

    html += `<hr><b style="font-size: 20px; color: #2D5F3F;">Grand Total: £${grandTotal.toFixed(2)}</b>`;
    document.getElementById('previewArea').innerHTML = html;
  }

  function nextStep(id) {
    document.querySelectorAll('.form-step').forEach(step => step.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function prevStep() {
    const active = document.querySelector('.form-step.active');
    if (active.id === 'step-item-1') nextStep('step-details');
    else if (active.id.startsWith('step-item-')) {
      const num = parseInt(active.id.split('-').pop());
      nextStep(`step-item-${num - 1}`);
    } else if (active.id === 'step-confirm') {
      nextStep(`step-item-${currentItemIndex}`);
    }
  }

  document.addEventListener('input', function (e) {
    if (e.target.id && e.target.id.startsWith('itemLink-')) e.target.setCustomValidity("");
  }, false);

  async function submitForm() {
    const btn = document.getElementById('submitBtn');
    if (!document.getElementById('orderDesc').reportValidity()) return;
    btn.disabled = true;
    btn.textContent = 'Submitting…';
    showLoading('Submitting your order…');

    const items = [];
    for (let i = 1; i <= 10; i++) {
      items.push({
        name: i <= currentItemIndex ? document.getElementById(`itemName-${i}`).value : "",
        code: i <= currentItemIndex ? document.getElementById(`itemCode-${i}`).value : "",
        link: i <= currentItemIndex ? document.getElementById(`itemLink-${i}`).value : "",
        price: i <= currentItemIndex ? document.getElementById(`itemPrice-${i}`).value : "",
        qty: i <= currentItemIndex ? document.getElementById(`itemQty-${i}`).value : ""
      });
    }

    const payload = {
      name: document.getElementById('userName').value,
      budget: document.getElementById('budgetSelect').value,
      supplier: document.getElementById('supplierSelect').value === 'other'
        ? document.getElementById('otherSupplierText').value
        : document.getElementById('supplierSelect').value,
      description: document.getElementById('orderDesc').value,
      comments: document.getElementById('comments').value,
      items: items
    };

    try {
      const res = await fetch('/.netlify/functions/submitPO', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Submission failed');
      nextStep('step-success');
    } catch (err) {
      alert('Error submitting form: ' + err.message);
      btn.disabled = false;
      btn.textContent = 'Submit Request';
    } finally {
      hideLoading();
    }
  }
</script>
</body>
</html>
